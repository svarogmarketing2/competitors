<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КОНКУРЕНТНАЯ МАТРИЦА — ВОЛЬФРАМОВЫЕ ЭЛЕКТРОДЫ</title>
<style>
:root {
  --bg:#f4f6f8; --panel:#fff; --line:#dde3ea; --text:#2c3e50; --muted:#73808c;
  --head:#36424f; --accent:#2ecc71; --orange:#e67e22; --soft-green:#eaf8f0;
}
*{box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:var(--text);font-size:11px}
.wrapper{max-width:1920px;margin:0 auto;padding:8px}
.main-title{
  text-align:center;font-weight:700;font-size:18px;letter-spacing:.02em;margin:0 0 8px;
  padding:10px;background:linear-gradient(90deg,#e8f8f5,#f7fffb);border-left:5px solid var(--accent);
  border-radius:10px;color:#22313f;
}
.topbar{position:sticky;top:0;z-index:50;background:rgba(244,246,248,.96);backdrop-filter:blur(4px);padding:8px 0 9px;border-bottom:1px solid var(--line)}
.toolbar{display:flex;gap:6px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.discount-panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px;display:flex;align-items:center;gap:6px;flex:1;min-width:600px;overflow-x:auto}
.discount-title{font-weight:700;white-space:nowrap;color:#3b4652;margin-right:2px}
.discount-item{display:flex;align-items:center;gap:4px;border:1px solid #dfe5ea;background:#f8fafb;border-radius:8px;padding:3px 6px;white-space:nowrap}
.discount-item span{font-weight:700;font-size:11px;color:#465461}
.discount-item input{width:42px;height:22px;border:1px solid #cfd7df;border-radius:6px;text-align:center;font-size:11px;background:#fff}
.btn{border:0;border-radius:9px;padding:7px 10px;background:var(--orange);color:white;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(230,126,34,.18);white-space:nowrap;font-size:11px}
.btn.secondary{background:#44515f}
.btn:hover{filter:brightness(.96)}
.update-panel{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 8px;min-width:280px;font-size:11px}
.status-dot{width:9px;height:9px;border-radius:50%;background:#bdc3c7;display:inline-block}
.status-dot.loading{background:#f5b041;animation:pulse 1s infinite}
.status-dot.success{background:#58d68d}
.status-dot.error{background:#ec7063}
@keyframes pulse{0%{opacity:.45}50%{opacity:1}100%{opacity:.45}}
.mark-filter{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.mark-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:700;color:#3b4652;cursor:pointer}
.mark-btn.active{border-color:#b7cfbf;background:#effaf3;color:#255d39}
.swatch{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;border:1px solid rgba(0,0,0,.15);vertical-align:-1px}
.mark-card{background:#fff;border:1px solid var(--line);border-radius:10px;margin:8px 0;overflow:hidden;box-shadow:0 3px 10px rgba(20,30,40,.04)}
.mark-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 8px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,var(--mark-soft),#fff 55%)}
.mark-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:#1f2d3d}
.mark-title a{color:#1f2d3d;text-decoration:underline dotted;text-underline-offset:3px}
.mark-meta{color:var(--muted);font-size:10px}
.zones{display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:6px;padding:6px;background:#fbfcfd}
.zone{border:1px solid #dfe5ea;border-radius:10px;background:#fff;overflow:hidden}
.zone h3{margin:0;padding:5px 7px;font-size:11px;letter-spacing:.04em;text-align:center;color:#334155;border-bottom:1px solid #dfe5ea;background:#f7f9fb}
.zone.rrc h3{background:#f1f7fb}
.zone.opt h3{background:#f6f8f2}
.zone.analysis h3{background:#f8f5f1}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{border-bottom:1px solid #eef2f5;border-right:1px solid #eef2f5;padding:2px 3px;text-align:center;vertical-align:middle;line-height:1.15;font-size:10px}
th{font-size:10px;background:#f8fafc;color:#576574;font-weight:700}
td{color:#263645}
th:first-child,td:first-child{width:36px;font-weight:700;background:#fbfcfd}
.price-link{color:#263645;text-decoration:underline dotted;text-underline-offset:2px;font-weight:700;background:#fff7ea;border-radius:4px;padding:1px 3px;display:inline-block;min-width:34px}
.price-link:hover{color:#e67e22;background:#fff0d8}
.svarog-price{background:#edf8f0}
.missing{color:#a0a8b0}
.positive{color:#1e8449;font-weight:700}
.negative{color:#b03a2e;font-weight:700}
.neutral{color:#697681}
.analysis-split{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px;background:#fff}
.analysis-sub{border:1px solid #e1e7ed;border-radius:8px;overflow:hidden;background:#fff}
.analysis-sub h4{margin:0;padding:5px 6px;text-align:center;font-size:10.5px;letter-spacing:.04em;color:#4b5563;background:#f7f6f3;border-bottom:1px solid #e1e7ed}
.analysis-sub.rrc-sub h4{background:#f2f7fb}
.analysis-sub.opt-sub h4{background:#f6f8f2}
.analysis-sub table th:first-child,.analysis-sub table td:first-child{width:36px}
.hidden{display:none!important}
@media(max-width:1500px){.zones{grid-template-columns:1fr}.discount-panel{min-width:100%}.analysis-split{grid-template-columns:1fr}}
@media print{.topbar{position:static}.btn{display:none}.mark-card{break-inside:avoid}}

/* === Visual clarity update: analysis headers and links === */
.analysis-sub table{
  table-layout:auto;
}
.analysis-sub table th{
  min-width:58px;
  padding:4px 5px;
  font-size:9.8px;
  line-height:1.15;
  white-space:normal;
  word-break:normal;
  overflow-wrap:anywhere;
  background:#f4f7fa;
  color:#34495e;
  border-right:1px solid #d7e0e8;
}
.analysis-sub table th:first-child,
.analysis-sub table td:first-child{
  min-width:34px;
  width:34px;
  background:#fbfcfd;
}
.analysis-sub table td{
  padding:3px 4px;
  font-size:10px;
  border-right:1px solid #e0e6ec;
}
.analysis-sub.rrc-sub{
  border-color:#cfddea;
}
.analysis-sub.opt-sub{
  border-color:#d8e2cf;
}
.analysis-sub.rrc-sub h4{
  background:#eaf4fb;
  color:#2f536f;
  border-bottom:1px solid #cfddea;
}
.analysis-sub.opt-sub h4{
  background:#f0f6e8;
  color:#4c6339;
  border-bottom:1px solid #d8e2cf;
}
.price-link.competitor-price{
  background:#fff2d9;
  border:1px solid #f0c27b;
  color:#8a4b08;
  text-decoration:underline;
  text-decoration-style:dotted;
  text-underline-offset:3px;
  font-weight:800;
  box-shadow:inset 0 -1px 0 rgba(230,126,34,.25);
}
.price-link.competitor-price::after{
  content:" ↗";
  font-size:9px;
  color:#a85d10;
}
.price-link.competitor-price:hover{
  background:#ffe7bd;
  color:#c26400;
  border-color:#e5a64e;
}
.price-link.svarog-price{
  background:#edf8f0;
  border:1px solid #c7e6cf;
  color:#245a36;
  text-decoration:underline dotted;
  text-underline-offset:3px;
}
.mark-title a{
  background:#f2fbf5;
  border:1px solid #ccebd5;
  border-radius:999px;
  padding:3px 8px;
  color:#23583a;
}
.mark-title a:hover{
  background:#e5f7eb;
  color:#184a2e;
}
@media(max-width:1500px){
  .analysis-sub table th{min-width:72px}
}


/* === Final readability update === */
.analysis-sub table th:first-child,
.analysis-sub table td:first-child{
  width:auto;
  min-width:74px;
  background:inherit;
}
.analysis-sub table th{
  white-space:nowrap!important;
  overflow-wrap:normal!important;
  word-break:normal!important;
  min-width:78px;
  font-size:9.6px;
  padding:4px 6px;
}
.analysis-sub table td{
  font-size:10px;
  padding:3px 5px;
}
.price-link.competitor-price{
  background:#fff8ed!important;
  border:1px solid #e6c38a!important;
  color:#5f4424!important;
  text-decoration:underline dotted!important;
  text-underline-offset:3px!important;
  font-weight:700!important;
  box-shadow:none!important;
}
.price-link.competitor-price::after{
  content:"";
}
.price-link.competitor-price:hover{
  background:#fff1d9!important;
  border-color:#d9ad6a!important;
  color:#8a4b08!important;
}
.discount-item{
  background:#f4f7f6!important;
  border-color:#cfded7!important;
  box-shadow:inset 3px 0 0 #9ecfb0;
}
.discount-item input{
  background:#fffdf8!important;
  border-color:#cdbb94!important;
  color:#2c3e50!important;
  font-weight:700;
}
.discount-item input:focus{
  outline:2px solid rgba(158,207,176,.25);
  border-color:#8fbd9d!important;
}


/* === Analysis compact grouped view === */
.zone.analysis{min-width:0;}
.analysis-split{display:grid!important;grid-template-columns:1fr!important;gap:5px!important;padding:5px!important;}
.analysis-sub{border-radius:8px!important;}
.analysis-sub h4{padding:4px 6px!important;font-size:10.5px!important;}
.analysis-sub table{table-layout:fixed!important;width:100%!important;}
.analysis-sub table th{min-width:0!important;width:auto!important;padding:4px 2px!important;font-size:8.7px!important;line-height:1.05!important;white-space:normal!important;overflow-wrap:break-word!important;word-break:normal!important;}
.analysis-sub table td{padding:3px 2px!important;font-size:9.3px!important;line-height:1.05!important;white-space:nowrap!important;}
.analysis-sub table th .comp-short{display:block;font-weight:800;}
.analysis-sub table th .comp-full{display:none;}
.analysis-note{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 6px;font-size:9px;color:#687684;background:#fbfcfd;border-top:1px solid #eef2f5;}
.analysis-note span{white-space:nowrap;}
@media(min-width:1650px){.analysis-sub table th{font-size:9.2px!important}.analysis-sub table td{font-size:9.7px!important}}


/* === Analysis full competitor names readable === */
.analysis-sub table th{
  font-size:8.4px!important;
  line-height:1.08!important;
  padding:4px 2px!important;
  white-space:normal!important;
  overflow-wrap:break-word!important;
  word-break:normal!important;
  hyphens:auto;
}
.analysis-sub table th .comp-short{
  display:none!important;
}
.analysis-sub table th .comp-full{
  display:block!important;
  font-weight:800;
  letter-spacing:-.02em;
}
.analysis-sub table td{
  font-size:9.2px!important;
  padding:3px 2px!important;
}
@media(min-width:1700px){
  .analysis-sub table th{font-size:9px!important}
  .analysis-sub table td{font-size:9.7px!important}
}


/* === HTML requested refinements: diameter emphasis and OPT compact view === */
.zone.rrc table th:first-child,
.zone.rrc table td:first-child{
  background:#eef7f0!important;
  color:#245a36!important;
  border-right:2px solid #c7e6cf!important;
  font-weight:800!important;
}
.zone.rrc table td:first-child{
  border-radius:4px;
}
.zone.opt table th:first-child,
.zone.opt table td:first-child{
  display:none!important;
}
.zone.opt table th:nth-child(2),
.zone.opt table td:nth-child(2){
  border-left:0!important;
}

</style>
</head>
<body>

    <h1 class="main-title">КОНКУРЕНТНАЯ МАТРИЦА — ВОЛЬФРАМОВЫЕ ЭЛЕКТРОДЫ</h1>

      <button class="btn" onclick="exportExcel()">Отчет в Excel</button>

    <div class="mark-filter" id="markFilter"></div>
  </div>
  <main id="matrix"></main>
</div>

function safeUrl(url) {
  if(!url) return "#";
  return String(url).trim();
}
function parseNumberRu(value){
  if(value === null || value === undefined) return null;
  const cleaned = String(value).replace(/\s+/g,"").replace(/[^\d,.\-]/g,"").replace(",",".");
  const m = cleaned.match(/\d+(?:\.\d+)?/);
  if(!m) return null;
  const n = parseFloat(m[0]);
  return Number.isFinite(n) ? n : null;
}
function formatPriceRu(value, comp){
  if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
  if(comp === "СВАРОГ") return Number(value).toFixed(1).replace(".",",");
  return String(Math.round(Number(value)));
}
function formatExcelPrice(value){
  if(value === null || value === undefined || !Number.isFinite(Number(value))) return "";
  return String(Math.round(Number(value)));
}
function formatPercentRu(value){
  if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
  return Number(value).toFixed(1).replace(".",",") + "%";
}
function getDiscount(comp){
  const input = document.querySelector(`input[data-discount="${comp}"]`);
  const v = parseNumberRu(input ? input.value : "");
  return v ? v / 100 : 0;
}
function calcOpt(rowId, comp){
  const rrc = rrcValues[rowId] ? rrcValues[rowId][comp] : null;
  if(rrc === null || rrc === undefined) return null;
  return rrc - (rrc * getDiscount(comp));
}
function calcAnalysis(rowId, comp, type){
  if(comp === "СВАРОГ") return null;
  const svarog = type === "rrc" ? rrcValues[rowId]["СВАРОГ"] : calcOpt(rowId, "СВАРОГ");
  const competitor = type === "rrc" ? rrcValues[rowId][comp] : calcOpt(rowId, comp);
  if(!svarog || !competitor) return null;
  return ((svarog - competitor) / competitor) * 100;
}
function classByPercent(v){
  if(v === null || v === undefined || !Number.isFinite(v)) return "neutral";
  if(v < 0) return "positive";
  if(v > 0) return "negative";
  return "neutral";
}

  return new Date(new Date().toLocaleString("en-US", {timeZone: PRICE_UPDATE_CONFIG.timezone}));
}
function isNightMoscow(){
  const h = getMoscowDate().getHours();
  return h >= PRICE_UPDATE_CONFIG.nightStartHour && h < PRICE_UPDATE_CONFIG.nightEndHour;
}

function cellRrc(row, comp){

  const value = rrcValues[row.id][comp];
  const href = safeUrl(data.url);
  if(value === null || value === undefined) return `<span class="missing">—</span>`;
  const cls = comp === "СВАРОГ" ? "price-link svarog-price" : "price-link competitor-price";
  return `<a href="${href}" target="_blank" rel="noopener noreferrer" class="${cls}" data-row="${row.id}" data-comp="${comp}" title="${comp === 'СВАРОГ' ? 'Ссылка СВАРОГ по марке/позиции: ' : 'Ссылка на РРЦ конкурента: '}${href !== '#' ? href : 'ссылка не указана'}">${formatPriceRu(value, comp)}</a>`;
}
function buildPriceTable(rows, type){
  const head = `<tr><th>Ø</th>${COMPETITORS.map(c => `<th>${c}</th>`).join("")}</tr>`;
  const body = rows.map(row => {
    const tds = COMPETITORS.map(comp => {
      if(type === "rrc") return `<td>${cellRrc(row, comp)}</td>`;
      const opt = calcOpt(row.id, comp);
      return `<td data-opt-row="${row.id}" data-opt-comp="${comp}">${formatPriceRu(opt, comp)}</td>`;
    }).join("");
    return `<tr><td>${row.diam}</td>${tds}</tr>`;
  }).join("");
  return `<table>${head}${body}</table>`;
}
function buildAnalysisTable(rows){
  const comps = COMPETITORS.filter(c => c !== "СВАРОГ");
  const shortNames = {
    "STARTWELD":"START",
    "FOXWELD":"FOX",
    "ОБЕРОН":"ОБЕРОН",
    "КЕДР":"КЕДР",
    "ПТК":"ПТК",
    "MTL":"MTL"
  };
  function subTable(type, title){
    const head = `<tr>${comps.map(c => `<th title="${c}"><span class="comp-full">${c}</span></th>`).join("")}</tr>`;
    const body = rows.map(row => {
      const tds = comps.map(comp => {
        const v = calcAnalysis(row.id, comp, type);
        return `<td title="${row.mark} Ø ${row.diam} · ${comp}" data-analysis-row="${row.id}" data-analysis-comp="${comp}" data-analysis-type="${type}" class="${classByPercent(v)}">${formatPercentRu(v)}</td>`;
      }).join("");
      return `<tr>${tds}</tr>`;
    }).join("");
    return `<div class="analysis-sub ${type === "rrc" ? "rrc-sub" : "opt-sub"}"><h4>${title}</h4><table class="analysis-table">${head}${body}</table></div>`;
  }
  return `<div class="analysis-split">${subTable("rrc","АНАЛИЗ РРЦ")}${subTable("opt","АНАЛИЗ ОПТ")}<div class="analysis-note"><span>Отклонение к СВАРОГ, %</span><span>минус — СВАРОГ дешевле</span></div></div>`;
}

function getHostName(url){
  try {
    return new URL(url).hostname.replace(/^www\./, "").toLowerCase();
  } catch(e) {
    return "";
  }
}

function getDomainRule(url){
  const host = getHostName(url);
  const keys = Object.keys(PRICE_UPDATE_CONFIG.domainRules || {});
  for(const key of keys){
    if(host === key || host.endsWith("." + key)) return PRICE_UPDATE_CONFIG.domainRules[key];
  }
  return {selectors: [], labels: []};
}

function uniqArray(arr){
  return Array.from(new Set((arr || []).filter(Boolean)));
}

function normalizeFetchedText(text){
  if(!text) return "";
  let t = String(text);
  try {
    const obj = JSON.parse(t);
    if(obj && typeof obj === "object"){
      if(typeof obj.contents === "string") return obj.contents;
      if(typeof obj.data === "string") return obj.data;
      if(typeof obj.html === "string") return obj.html;
    }
  } catch(e) {}
  return t;
}

async function fetchText(url){
  let errors = [];

  const attempts = [];
  if(PRICE_UPDATE_CONFIG.proxyEndpoint){
    attempts.push(PRICE_UPDATE_CONFIG.proxyEndpoint + encodeURIComponent(url));
  }

  for(const prefix of PRICE_UPDATE_CONFIG.corsFallbacks){
    // corsproxy.io expects raw URL after ?, allorigins expects encoded URL.
    const target = prefix.indexOf("corsproxy.io") !== -1 ? prefix + url : prefix + encodeURIComponent(url);
    attempts.push(target);
  }

  for(const target of attempts){
    try {
      const res = await fetch(target, {cache:"no-store"});
      if(res.ok) return normalizeFetchedText(await res.text());
      errors.push(target + " HTTP " + res.status);
    } catch(e) {
      errors.push(target + " " + e.message);
    }
  }

  throw new Error(errors.join("; ") || "Не удалось получить страницу");
}

function addCandidate(candidates, value, source, weight, raw){
  const price = parseNumberRu(value);
  if(!price || price < PRICE_UPDATE_CONFIG.minPrice || price > PRICE_UPDATE_CONFIG.maxPrice) return;
  const rawText = String(raw || value || "");
  const lower = rawText.toLowerCase();

  // Отсекаем очевидные размеры/диаметры без признаков цены.
  const hasCurrency = /₽|руб|р\.|rub|price|цена|ррц/i.test(rawText);
  const looksLikeDimension = /мм|mm|ø|диаметр|размер|175|1\.6|2\.4|3\.2/i.test(rawText);
  if(looksLikeDimension && !hasCurrency && price < 50) return;

  candidates.push({
    price,
    source,
    weight: weight || 1,
    raw: rawText.slice(0, 160)
  });
}

function scoreCandidate(candidate, expectedPrice){
  let score = candidate.weight || 1;

  if(expectedPrice && Number.isFinite(Number(expectedPrice))){
    const expected = Number(expectedPrice);
    const diff = Math.abs(candidate.price - expected);
    const rel = diff / Math.max(expected, 1);

    // Если цена близка к предыдущему значению, повышаем уверенность.
    if(rel <= 0.02) score += 8;
    else if(rel <= 0.05) score += 6;
    else if(rel <= 0.15) score += 4;
    else if(rel <= 0.35) score += 2;
    else if(candidate.price < expected * 0.25 || candidate.price > expected * 4) score -= 5;
  }

  if(/₽|руб|rub/i.test(candidate.raw)) score += 2;
  if(/ррц|розничная|цена/i.test(candidate.raw)) score += 2;

  return score;
}

function chooseBestCandidate(candidates, expectedPrice){
  if(!candidates.length) return null;
  candidates.sort((a,b) => scoreCandidate(b, expectedPrice) - scoreCandidate(a, expectedPrice));
  return candidates[0];
}

function extractPriceFromJsonLd(doc, candidates){
  const scripts = Array.from(doc.querySelectorAll('script[type="application/ld+json"]'));
  for(const s of scripts){
    try {
      const data = JSON.parse(s.textContent.trim());
      const stack = Array.isArray(data) ? data.slice() : [data];

      while(stack.length){
        const obj = stack.shift();
        if(!obj || typeof obj !== "object") continue;

        if(obj.offers){
          const offers = Array.isArray(obj.offers) ? obj.offers : [obj.offers];
          for(const offer of offers){
            addCandidate(candidates, offer.price || offer.lowPrice || offer.highPrice, "jsonld.offers.price", 12, JSON.stringify(offer).slice(0,180));
          }
        }

        if(obj.price) addCandidate(candidates, obj.price, "jsonld.price", 10, JSON.stringify(obj).slice(0,180));

        Object.keys(obj).forEach(k => {
          if(typeof obj[k] === "object") stack.push(obj[k]);
        });
      }
    } catch(e) {}
  }
}

function extractPriceFromMeta(doc, candidates){
  const metaSelectors = [
    "meta[itemprop='price']",
    "meta[property='product:price:amount']",
    "meta[name='product:price:amount']",
    "meta[property='og:price:amount']",
    "meta[name='price']"
  ];

  for(const selector of metaSelectors){
    const nodes = Array.from(doc.querySelectorAll(selector));
    for(const node of nodes){
      addCandidate(candidates, node.getAttribute("content"), selector, 11, node.outerHTML);
    }
  }
}

function extractPriceFromSelectors(doc, candidates, url){
  const rule = getDomainRule(url);
  const selectors = uniqArray([...(rule.selectors || []), ...PRICE_UPDATE_CONFIG.commonSelectors]);

  for(const selector of selectors){
    const nodes = Array.from(doc.querySelectorAll(selector)).slice(0, 12);
    for(const node of nodes){
      const raw = node.getAttribute("content") ||
        node.getAttribute("data-price") ||
        node.getAttribute("data-product-price") ||
        node.getAttribute("data-offer-price") ||
        node.textContent;
      addCandidate(candidates, raw, "selector:" + selector, 8, raw);
    }
  }
}

function extractPriceFromText(doc, candidates, url){
  const rule = getDomainRule(url);
  const text = doc.body ? doc.body.innerText : doc.documentElement.innerText;
  const labels = uniqArray([...(rule.labels || []), "РРЦ", "розничная цена", "цена", "стоимость"]);

  for(const label of labels){
    const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp(escaped + "\\\\D{0,80}(\\\\d[\\\\d\\\\s.,]{2,})\\\\s*(?:₽|руб\\\\.?|р\\\\.?|RUB)?", "ig");
    let match;
    while((match = re.exec(text)) !== null){
      addCandidate(candidates, match[1], "text-label:" + label, 6, match[0]);
    }
  }

  // Последний резерв: числа рядом с валютой.
  const currencyRe = /(\d[\d\s.,]{2,})\s*(?:₽|руб\.?|р\.|RUB)/ig;
  let match;
  while((match = currencyRe.exec(text)) !== null){
    addCandidate(candidates, match[1], "text-currency", 4, match[0]);
  }
}

function extractPriceFromHtml(htmlText, url, expectedPrice){
  const doc = new DOMParser().parseFromString(htmlText, "text/html");
  const candidates = [];

  extractPriceFromJsonLd(doc, candidates);
  extractPriceFromMeta(doc, candidates);
  extractPriceFromSelectors(doc, candidates, url);
  extractPriceFromText(doc, candidates, url);

  const best = chooseBestCandidate(candidates, expectedPrice);
  return best ? best.price : null;
}
function savePriceHistory(item){
  const key = "ve_rrc_price_history";
  let history = [];
  try { history = JSON.parse(localStorage.getItem(key) || "[]"); } catch(e) {}
  history.push(item);
  localStorage.setItem(key, JSON.stringify(history.slice(-2000)));
}
async function updateAllRRCPrices(){
  const links = Array.from(document.querySelectorAll("a.competitor-price")).filter(a => a.href && !a.href.endsWith("#"));
  const started = new Date();
  const startedMsk = getMoscowDate();
  if(!links.length){
    setUpdateStatus("Нет активных ссылок для обновления РРЦ.", "error");
    return;
  }
  setUpdateStatus("Обновление РРЦ: выполняется сбор цен…", "loading");
  let ok = 0, fail = 0;
  for(const link of links){
    const rowId = Number(link.dataset.row);
    const comp = link.dataset.comp;
    const oldPrice = rrcValues[rowId][comp];
    try{
      const text = await fetchText(link.href);
      const newPrice = extractPriceFromHtml(text, link.href, oldPrice);
      if(!newPrice) throw new Error("Цена не найдена");
      rrcValues[rowId][comp] = newPrice;
      link.textContent = formatPriceRu(newPrice, comp);
      savePriceHistory({
        updatedAt: started.toISOString(),
        updatedAtMsk: startedMsk.toLocaleString("ru-RU"),
        mark: MATRIX_DATA.find(r => r.id === rowId).mark,
        diameter: MATRIX_DATA.find(r => r.id === rowId).diam,
        competitor: comp,
        url: link.href,
        oldPrice: oldPrice,
        newPrice: newPrice,
        delta: oldPrice ? newPrice - oldPrice : null,
        deltaPercent: oldPrice ? ((newPrice - oldPrice) / oldPrice) * 100 : null,
        status: "OK"
      });
      ok++;
    } catch(e){
      savePriceHistory({
        updatedAt: started.toISOString(),
        updatedAtMsk: startedMsk.toLocaleString("ru-RU"),
        mark: MATRIX_DATA.find(r => r.id === rowId).mark,
        diameter: MATRIX_DATA.find(r => r.id === rowId).diam,
        competitor: comp,
        url: link.href,
        oldPrice: oldPrice,
        newPrice: null,
        delta: null,
        deltaPercent: null,
        status: "ERROR: " + e.message
      });
      fail++;
    }
  }
  recalculateAll();
  const msg = `Последнее обновление: ${startedMsk.toLocaleString("ru-RU")} МСК. Успешно: ${ok}, ошибок: ${fail}`;
  setUpdateStatus(msg, fail ? "error" : "success");
  localStorage.setItem("ve_last_update_status", msg);
}
function scheduleNightUpdate(){
  const now = getMoscowDate();
  const key = now.toISOString().slice(0,10);
  const last = localStorage.getItem("ve_last_auto_update_date");
  if(isNightMoscow() && last !== key){
    localStorage.setItem("ve_last_auto_update_date", key);
    updateAllRRCPrices();
  }
}
